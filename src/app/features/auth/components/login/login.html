<div
  [attr.data-theme]="theme()"
  class="relative flex min-h-screen flex-col bg-[var(--bg)] text-[var(--text)] transition-colors duration-200"
>
  <div
    class="absolute top-[22px] right-6 inline-flex gap-1 rounded-[11px] border border-[var(--border)] bg-[var(--bg-2)] p-1"
  >
    <button
      type="button"
      (click)="setTheme('light')"
      class="rounded-lg px-[18px] py-[7px] text-[13px] font-semibold transition-colors"
      [class]="lightSegmentClass()"
    >
      Chiaro
    </button>
    <button
      type="button"
      (click)="setTheme('dark')"
      class="rounded-lg px-[18px] py-[7px] text-[13px] font-semibold transition-colors"
      [class]="darkSegmentClass()"
    >
      Scuro
    </button>
  </div>

  <div class="flex flex-1 items-center justify-center px-6 py-16">
    <div
      class="w-full max-w-[392px] rounded-2xl border border-[var(--border)] bg-[var(--surface)] p-9 px-9 shadow-[var(--shadow)]"
    >
      <div class="mb-6 font-mono text-base font-semibold tracking-tight text-[var(--text)]">
        qnq<span class="text-[var(--accent)]">.</span>
      </div>
      <h1 class="m-0 mb-1.5 text-[23px] font-bold tracking-tight text-[var(--text)]">Accedi</h1>
      <p class="m-0 mb-7 text-sm leading-relaxed text-[var(--text-muted)]">
        Console di misurazione multi-server
      </p>

      <form (submit)="$event.preventDefault(); submit()">
        <label class="mb-[7px] block text-[13px] font-medium text-[var(--text-muted)]">Email</label>
        <input
          type="email"
          [value]="email()"
          (input)="onEmailChange($any($event.target).value)"
          placeholder="nome@ateneo.it"
          class="h-[46px] w-full rounded-[10px] border border-[var(--border)] bg-[var(--surface-2)] px-[14px] text-[15px] text-[var(--text)] outline-none transition-shadow focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-soft)]"
        />

        <div class="mt-[18px] mb-[7px] flex items-baseline justify-between">
          <label class="text-[13px] font-medium text-[var(--text-muted)]">Password</label>
          <a href="#" class="text-[13px] text-[var(--accent)] hover:text-[var(--accent-hover)]"
            >Password dimenticata?</a
          >
        </div>
        <div class="relative">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            [value]="password()"
            (input)="onPasswordChange($any($event.target).value)"
            placeholder="••••••••"
            class="h-[46px] w-full rounded-[10px] border border-[var(--border)] bg-[var(--surface-2)] py-0 pr-[74px] pl-[14px] text-[15px] text-[var(--text)] outline-none transition-shadow focus:border-[var(--accent)] focus:shadow-[0_0_0_3px_var(--accent-soft)]"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute top-1/2 right-2 -translate-y-1/2 rounded-md border-none bg-transparent px-2 py-1.5 text-[12.5px] font-medium text-[var(--text-muted)] hover:text-[var(--text)]"
          >
            {{ showPassword() ? 'Nascondi' : 'Mostra' }}
          </button>
        </div>

        @if (error()) {
          <div class="mt-4 flex items-center gap-2 rounded-[9px] bg-[var(--danger-soft)] px-3 py-2.5">
            <span
              class="flex h-4 w-4 flex-none items-center justify-center rounded-full bg-[var(--danger)] text-[11px] leading-none font-bold text-white"
              >!</span
            >
            <span class="text-[13px] text-[var(--danger)]">{{ error() }}</span>
          </div>
        }

        <button
          type="submit"
          [disabled]="status() === 'loading'"
          class="mt-6 h-[46px] w-full rounded-[10px] border-none bg-[var(--accent)] text-[15px] font-semibold text-white transition-colors hover:bg-[var(--accent-hover)] disabled:cursor-default disabled:opacity-80"
        >
          @if (status() === 'loading') {
            Accesso in corso…
          } @else if (status() === 'success') {
            ✓ Accesso effettuato
          } @else {
            Accedi
          }
        </button>
      </form>

      <p class="m-0 mt-6 text-center font-mono text-[11px] text-[var(--text-faint)]">
        accesso riservato · qnq-ui
      </p>
    </div>
  </div>
</div>
